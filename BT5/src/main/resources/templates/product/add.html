<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Thêm Sản Phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Thêm Sản Phẩm Mới</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/save}" th:object="${product}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="name" class="form-label">Tên Sản Phẩm <span class="text-danger">*</span></label>
                            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Nhập tên sản phẩm" required>
                            <small class="form-text text-muted" th:if="*{name}">Tên sản phẩm không được để trống</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="image" class="form-label">URL Hình Ảnh</label>
                            <input class="form-control" type="url" th:field="*{image}" id="image" placeholder="https://example.com/image.jpg">
                        </div>
                        
                        <div class="mb-3">
                            <label for="price" class="form-label">Giá Sản Phẩm (VNĐ) <span class="text-danger">*</span></label>
                            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="0" min="1" required>
                            <small class="form-text text-muted">Giá phải lớn hơn 0</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Danh Mục <span class="text-danger">*</span></label>
                            <select th:field="*{categoryId}" class="form-select" id="categoryId" required>
                                <option value="">--- Chọn Danh Mục ---</option>
                                <option th:each="cat : ${categories}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.name}"></option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success btn-lg flex-grow-1">✅ Thêm Sản Phẩm</button>
                            <a th:href="@{/products}" class="btn btn-secondary btn-lg">❌ Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
